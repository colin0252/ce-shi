name: 手动打包IPA
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 拉取代码
        uses: actions/checkout@v6

      - name: 编译Release APP
        run: |
          mkdir -p output
          xcodebuild build \
          -project StikDebug.xcodeproj \
          -scheme StikDebug \
          -configuration Release \
          -sdk iphoneos \
          -derivedDataPath ./dd \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES=YES \
          SWIFT_VERSION=5 \
          IPHONEOS_DEPLOYMENT_TARGET=16.0 \
          COMPILE_BITCODE=NO

      - name: 固定路径打包IPA
        run: |
          mkdir -p Payload
          cp -r dd/Build/Products/Release-iphoneos/StikDebug.app Payload/
          zip -r output/StikDebug.ipa Payload
          ls output/

      - name: 上传成品IPA
        uses: actions/upload-artifact@v7
        with:
          name: StikDebug收号器
          path: output/StikDebug.ipa