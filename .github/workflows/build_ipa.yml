name: Build Unsigned IPA

on:
  workflow_dispatch:          # 允许在 GitHub 网页上手动触发

jobs:
  build:
    runs-on: macos-latest     # 使用最新 macOS 环境

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ============================================================
      # 步骤 1：Archive（生成 .xcarchive）
      # ============================================================
      - name: Archive
        run: |
          xcodebuild archive \
            -project StikDebug.xcodeproj \
            -scheme StikDebug \
            -archivePath build/StikDebug.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PRODUCT_BUNDLE_IDENTIFIER=com.stikdebug.app
            # ↑ 关键修改：必须明确指定 Bundle Identifier，否则会报
            #   "Archive Missing Bundle Identifier"

      # ============================================================
      # 步骤 2：导出无签名 IPA
      # ============================================================
      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath build/StikDebug.xcarchive \
            -exportPath build \
            -exportOptionsPlist Export.plist \
            CODE_SIGNING_ALLOWED=NO

      # ============================================================
      # 步骤 3：上传 IPA 为构建产物（可选，方便下载）
      # ============================================================
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: StikDebug-unsigned.ipa
          path: build/*.ipa