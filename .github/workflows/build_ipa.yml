name: Build IPA
on: push

jobs:
  build:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: 编译出.app文件（不使用archive，规避Xcode16 BundleID校验BUG）
        run: |
          mkdir -p build
          xcodebuild build \
          -project StikDebug.xcodeproj \
          -scheme StikDebug \
          -configuration Release \
          -sdk iphoneos \
          -derivedDataPath ./build/dd \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES=YES \
          SWIFT_VERSION=5 \
          IPHONEOS_DEPLOYMENT_TARGET=16.0 \
          COMPILE_BITCODE=NO

      - name: 把.app打包成无签名IPA
        run: |
          cd build/dd/Build/Products/Release-iphoneos
          mkdir Payload
          cp -r StikDebug.app Payload/
          zip -q -r StikDebug成品IPA.zip Payload
          mv StikDebug成品IPA.zip ../../StikDebug.ipa

      - name: 上传IPA
        uses: actions/upload-artifact@v7
        with:
          name: StikDebug收号器
          path: build/StikDebug.ipa