name: Build IPA
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-15
    steps:
    - uses: actions/checkout@v4

    - name: 指定Xcode16.4
      run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

    - name: 归档打包（强制写入BundleID，解决exit code70）
      run: |
        mkdir -p build
        xcodebuild archive \
        -project StikDebug.xcodeproj \
        -scheme StikDebug \
        -configuration Release \
        -sdk iphoneos \
        -archivePath ./build/StikDebug.xcarchive \
        PRODUCT_BUNDLE_IDENTIFIER="com.stikdebug.app" \
        CODE_SIGN_IDENTITY="" \
        CODE_SIGNING_REQUIRED=NO \
        CODE_SIGNING_ALLOWED=NO \
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES=YES \
        SWIFT_VERSION=5 \
        IPHONEOS_DEPLOYMENT_TARGET=16.0 \
        COMPILE_BITCODE=NO

    - name: 导出无签名IPA
      run: |
        echo '{"method":"development","signingStyle":"manual","compileBitcode":false,"thinning":"none"}' > export.plist
        xcodebuild -exportArchive \
        -archivePath ./build/StikDebug.xcarchive \
        -exportPath ./output \
        -exportOptionsPlist export.plist

    - name: 上传成品IPA
      uses: actions/upload-artifact@v4
      with:
        name: StikDebug成品
        path: output/StikDebug.ipa