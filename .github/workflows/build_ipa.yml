name: Build Unsigned IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Show available Xcode versions
      run: ls /Applications/ | grep Xcode
    
    - name: Create LaunchScreen.storyboard
      run: |
        mkdir -p DeltaLogin/Base.lproj
        cat > DeltaLogin/Base.lproj/LaunchScreen.storyboard << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <document type="com.apple.InterfaceBuilder3.CocoaTouch.Storyboard.XIB" version="3.0" toolsVersion="21701" targetRuntime="AppleSDK" propertyAccessControl="none" useAutolayout="YES" launchScreen="YES" useTraitCollections="YES" useSafeAreas="YES" colorMatched="YES" initialViewController="01J-lp-oVM">
            <dependencies>
                <plugIn identifier="com.apple.InterfaceBuilder.IBCocoaTouchPlugin" version="21678"/>
                <capability name="Safe area layout guides" minToolsVersion="9.0"/>
            </dependencies>
            <scenes>
                <scene sceneID="EHf-IW-A2E">
                    <objects>
                        <viewController id="01J-lp-oVM" sceneMemberID="viewController">
                            <view key="view" contentMode="scaleToFill" id="Ze5-6b-2t3">
                                <rect key="frame" x="0.0" y="0.0" width="393" height="852"/>
                                <autoresizingMask key="autoresizingMask" widthSizable="YES" heightSizable="YES"/>
                                <subviews>
                                    <label opaque="NO" clipsSubviews="YES" userInteractionEnabled="NO" contentMode="left" horizontalHuggingPriority="251" verticalHuggingPriority="750" text="DeltaLogin" textAlignment="center" lineBreakMode="middleTruncation" baselineAdjustment="alignBaselines" minimumFontSize="18" translatesAutoresizingMaskIntoConstraints="NO" id="GJd-Yh-RWb">
                                        <rect key="frame" x="96.666666666666671" y="406" width="200" height="40"/>
                                        <fontDescription key="fontDescription" type="boldSystem" pointSize="30"/>
                                        <color key="textColor" white="1" alpha="1" colorSpace="custom" customColorSpace="genericGamma22GrayColorSpace"/>
                                    </label>
                                </subviews>
                                <viewLayoutGuide key="safeArea" id="Bcu-3y-fUS"/>
                                <color key="backgroundColor" red="0.12" green="0.12" blue="0.18" alpha="1" colorSpace="custom" customColorSpace="sRGB"/>
                                <constraints>
                                    <constraint firstItem="GJd-Yh-RWb" firstAttribute="centerX" secondItem="Ze5-6b-2t3" secondAttribute="centerX" id="Q3B-4B-g5h"/>
                                    <constraint firstItem="GJd-Yh-RWb" firstAttribute="centerY" secondItem="Ze5-6b-2t3" secondAttribute="centerY" id="moa-c2-u7t"/>
                                </constraints>
                            </view>
                        </viewController>
                        <placeholder placeholderIdentifier="IBFirstResponder" id="iYj-Kq-Ea1" sceneMemberID="firstResponder"/>
                    </objects>
                    <point key="canvasLocation" x="53" y="375"/>
                </scene>
            </scenes>
        </document>
        EOF
    
    - name: Fix Info.plist
      run: |
        /usr/libexec/PlistBuddy -c "Add :UILaunchStoryboardName string LaunchScreen" DeltaLogin/Info.plist 2>/dev/null || true
        /usr/libexec/PlistBuddy -c "Add :UIRequiresFullScreen bool true" DeltaLogin/Info.plist 2>/dev/null || true

    - name: Build archive
      run: |
        xcodebuild clean archive \
          -project DeltaLogin.xcodeproj \
          -scheme DeltaLogin \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          -archivePath build/DeltaLogin.xcarchive \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          PRODUCT_BUNDLE_IDENTIFIER=com.fake.DeltaLogin \
          IPHONEOS_DEPLOYMENT_TARGET=16.4 \
          DEBUG_INFORMATION_FORMAT=dwarf
    
    - name: Create unsigned IPA
      run: |
        mkdir -p Payload
        cp -r build/DeltaLogin.xcarchive/Products/Applications/DeltaLogin.app Payload/
        zip -r DeltaLogin.ipa Payload
        rm -rf Payload
    
    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: DeltaLogin-unsigned
        path: DeltaLogin.ipa
        retention-days: 90