name: DeltaLogin
options:
  bundleIdPrefix: com.fake
  deploymentTarget:
    iOS: "16.0"
targets:
  DeltaLogin:
    type: application
    platform: iOS
    sources:
      - path: .
        type: group
        includes:
          - "*.swift"
    resources:
      - path: Base.lproj/LaunchScreen.storyboard
    settings:
      base:
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.fake.DeltaLogin   # ← 明确指定包名
    info:
      path: Info.plist